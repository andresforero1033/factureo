<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factureo | Autenticación</title>
    <link rel="stylesheet" href="src/styles/style.css">
    <link rel="stylesheet" href="src/styles/login.css">
</head>
<body class="login-layout">
    
    <div class="login-box">
        <h1>Factureo</h1>
        <p>Acceso seguro al sistema de RRHH</p>
        
        <form id="login-form" class="login-form">
            <input type="text" id="username" placeholder="Usuario" required autocomplete="off">
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit" class="login-btn">Ingresar</button>
            <div id="login-error" class="login-error">Usuario o contraseña incorrectos</div>
        </form>
    </div>

    <script type="module">
        import { authService } from './src/services/authService.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            
            try {
                // Ejecutamos la petición al backend en Python
                await authService.login(user, pass);
                
                // Si la promesa se resuelve (código 200), viajamos al index
                window.location.href = 'index.html';
            } catch (error) {
                // Si la promesa falla (error 400), mostramos la alerta roja
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message;
            }
        });
    </script>
</body>
</html>
